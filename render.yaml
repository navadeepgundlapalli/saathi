services:
  - type: web
    name: saathi
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SAATHI_API_KEY
        sync: false          # you set this secret in the Render dashboard
      - key: PYTHON_VERSION
        value: "3.12.7"
